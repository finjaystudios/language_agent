services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-language_agent}
      POSTGRES_USER: ${POSTGRES_USER:-language_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-language_agent} -d ${POSTGRES_DB:-language_agent}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    image: local-language-agent-api
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://language_agent:change-me@postgres:5432/language_agent}
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  llama-server:
    image: ${LLAMA_SERVER_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    restart: unless-stopped
    command:
      - -m
      - ${LLAMA_SERVER_MODEL_PATH:-/models/Qwen3-4B-Q4_K_M.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "${LLAMA_SERVER_PORT:-8082}"
      - --ctx-size
      - "${LLAMA_SERVER_CONTEXT_SIZE:-2048}"
      - --n-gpu-layers
      - "${LLAMA_SERVER_N_GPU_LAYERS:-20}"
      - --batch-size
      - "${LLAMA_SERVER_BATCH_SIZE:-256}"
      - --ubatch-size
      - "${LLAMA_SERVER_UBATCH_SIZE:-128}"
      - --threads
      - "${LLAMA_SERVER_THREADS:-4}"
      - --parallel
      - "1"
    ports:
      - "${LLAMA_SERVER_HOST_PORT:-8080}:${LLAMA_SERVER_PORT:-8080}"
    volumes:
      - ./models:/models:ro
    gpus: all
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${LLAMA_SERVER_PORT:-8080}${LLAMA_SERVER_HEALTH_PATH:-/health} >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: local-language-agent-api
    ports:
      - "8000:8000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      FASTAPI_API_KEY: ${FASTAPI_API_KEY:-local-dev-change-me}
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-replace-with-random-secret-when-login-is-enabled}
      PASSWORD_HASH_SCHEME: ${PASSWORD_HASH_SCHEME:-argon2id}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://language_agent:change-me@postgres:5432/language_agent}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8001,http://127.0.0.1:8001}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_QUEUE_NAME: ${LLM_QUEUE_NAME:-llm}
      LLM_QUEUE_TIMEOUT_SECONDS: ${LLM_QUEUE_TIMEOUT_SECONDS:-180}
      LLM_QUEUE_WAIT_TIMEOUT_SECONDS: ${LLM_QUEUE_WAIT_TIMEOUT_SECONDS:-300}
      LLM_GENERATION_TIMEOUT_SECONDS: ${LLM_GENERATION_TIMEOUT_SECONDS:-180}
      LLM_RESULT_TTL_SECONDS: ${LLM_RESULT_TTL_SECONDS:-300}
      LLM_MAX_QUEUE_SIZE: ${LLM_MAX_QUEUE_SIZE:-100}
      LLM_JOB_MAX_RETRIES: ${LLM_JOB_MAX_RETRIES:-2}
      LLM_STREAM_CHANNEL_PREFIX: ${LLM_STREAM_CHANNEL_PREFIX:-llm-stream}
      LLM_STATUS_POLL_INTERVAL_SECONDS: ${LLM_STATUS_POLL_INTERVAL_SECONDS:-0.05}
      LLM_STREAM_TIMEOUT_SECONDS: ${LLM_STREAM_TIMEOUT_SECONDS:-180}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\"APP_PORT\", \"8000\")}/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  llm-worker:
    image: local-language-agent-api
    command: ["python", "-m", "app.worker.main"]
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_BACKEND: ${LLM_BACKEND:-llama_server}
      LLAMA_SERVER_URL: ${LLAMA_SERVER_URL:-http://llama-server:${LLAMA_SERVER_PORT:-8080}}
      LLAMA_SERVER_API_KEY: ${LLAMA_SERVER_API_KEY:-}
      LLAMA_SERVER_TIMEOUT_SECONDS: ${LLAMA_SERVER_TIMEOUT_SECONDS:-180}
      LLAMA_SERVER_STREAM_TIMEOUT_SECONDS: ${LLAMA_SERVER_STREAM_TIMEOUT_SECONDS:-180}
      LLAMA_SERVER_MODEL_NAME: ${LLAMA_SERVER_MODEL_NAME:-}
      LLAMA_SERVER_HEALTH_PATH: ${LLAMA_SERVER_HEALTH_PATH:-/health}
      MODEL_PROFILES_PATH: ${MODEL_PROFILES_PATH:-config/model_profiles.yml}
      LLM_QUEUE_NAME: ${LLM_QUEUE_NAME:-llm}
      LLM_QUEUE_TIMEOUT_SECONDS: ${LLM_QUEUE_TIMEOUT_SECONDS:-180}
      LLM_QUEUE_WAIT_TIMEOUT_SECONDS: ${LLM_QUEUE_WAIT_TIMEOUT_SECONDS:-300}
      LLM_GENERATION_TIMEOUT_SECONDS: ${LLM_GENERATION_TIMEOUT_SECONDS:-180}
      LLM_RESULT_TTL_SECONDS: ${LLM_RESULT_TTL_SECONDS:-300}
      LLM_MAX_QUEUE_SIZE: ${LLM_MAX_QUEUE_SIZE:-100}
      LLM_WORKER_CONCURRENCY: ${LLM_WORKER_CONCURRENCY:-1}
      LLM_JOB_MAX_RETRIES: ${LLM_JOB_MAX_RETRIES:-2}
      LLM_STREAM_CHANNEL_PREFIX: ${LLM_STREAM_CHANNEL_PREFIX:-llm-stream}
      LLM_STATUS_POLL_INTERVAL_SECONDS: ${LLM_STATUS_POLL_INTERVAL_SECONDS:-0.05}
      LLM_STREAM_TIMEOUT_SECONDS: ${LLM_STREAM_TIMEOUT_SECONDS:-180}
    depends_on:
      redis:
        condition: service_healthy
      llama-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys; from app.core.config import AppSettings; from app.infrastructure.llm.llama_server_gateway import LlamaServerGateway; sys.exit(0 if LlamaServerGateway(AppSettings.from_env()).check_health() else 1)",
        ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  webui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    image: local-language-agent-webui
    ports:
      - "8001:8001"
    environment:
      FASTAPI_BASE_URL: http://fastapi:8000
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      FASTAPI_API_KEY: ${FASTAPI_API_KEY:-local-dev-change-me}
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-replace-with-random-secret-when-login-is-enabled}
      CHAINLIT_COOKIE_SAMESITE: ${CHAINLIT_COOKIE_SAMESITE:-lax}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://language_agent:change-me@postgres:5432/language_agent}
      WEBUI_DATABASE_URL: ${WEBUI_DATABASE_URL:-postgresql+asyncpg://language_agent:change-me@postgres:5432/language_agent}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: 8001
      WEBUI_REQUEST_TIMEOUT_SECONDS: ${WEBUI_REQUEST_TIMEOUT_SECONDS:-120}
      WEBUI_STREAMING_ENABLED: ${WEBUI_STREAMING_ENABLED:-true}
      DEBUG: false
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      fastapi:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\"WEBUI_PORT\", \"8001\")}/', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      fastapi:
        condition: service_healthy
      llm-worker:
        condition: service_healthy
      webui:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  postgres-data:
  redis-data:
