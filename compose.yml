services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: local-language-agent-api
    ports:
      - "8000:8000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      FASTAPI_API_KEY: ${FASTAPI_API_KEY:-local-dev-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8001,http://127.0.0.1:8001}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_QUEUE_NAME: ${LLM_QUEUE_NAME:-llm}
      LLM_QUEUE_TIMEOUT_SECONDS: ${LLM_QUEUE_TIMEOUT_SECONDS:-180}
      LLM_RESULT_TTL_SECONDS: ${LLM_RESULT_TTL_SECONDS:-300}
      LLM_MAX_QUEUE_SIZE: ${LLM_MAX_QUEUE_SIZE:-100}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\"APP_PORT\", \"8000\")}/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  llm-worker:
    image: local-language-agent-api
    command: ["python", "-m", "app.queue.worker"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_QUEUE_NAME: ${LLM_QUEUE_NAME:-llm}
      LLM_QUEUE_TIMEOUT_SECONDS: ${LLM_QUEUE_TIMEOUT_SECONDS:-180}
      LLM_RESULT_TTL_SECONDS: ${LLM_RESULT_TTL_SECONDS:-300}
      LLM_MAX_QUEUE_SIZE: ${LLM_MAX_QUEUE_SIZE:-100}
      LLM_WORKER_CONCURRENCY: ${LLM_WORKER_CONCURRENCY:-1}
      LLM_MODEL_PATH: ${LLM_MODEL_PATH:-/models/Qwen2.5-7B-Instruct-Q4_K_M.gguf}
      LLM_CONTEXT_SIZE: ${LLM_CONTEXT_SIZE:-4096}
      LLM_N_GPU_LAYERS: ${LLM_N_GPU_LAYERS:--1}
      LLM_THREADS: ${LLM_THREADS:-4}
      LLM_RESERVED_VRAM_GB: ${LLM_RESERVED_VRAM_GB:-1.5}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/models:ro
    gpus: all

  webui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    image: local-language-agent-webui
    ports:
      - "8001:8001"
    environment:
      FASTAPI_BASE_URL: http://fastapi:8000
      FASTAPI_API_KEY: ${FASTAPI_API_KEY:-local-dev-change-me}
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: 8001
      WEBUI_REQUEST_TIMEOUT_SECONDS: ${WEBUI_REQUEST_TIMEOUT_SECONDS:-120}
      WEBUI_STREAMING_ENABLED: ${WEBUI_STREAMING_ENABLED:-true}
      DEBUG: false
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\"WEBUI_PORT\", \"8001\")}/', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      fastapi:
        condition: service_healthy
      llm-worker:
        condition: service_started
      webui:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
