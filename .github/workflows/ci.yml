name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest-cov

      - name: Compile Python sources
        run: python -m compileall app tests

      - name: Run tests
        run: python -m pytest --cov=app --cov-report=term-missing

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: python -m pip install --upgrade ruff

      - name: Run Ruff
        run: ruff check app tests

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security scanners
        run: python -m pip install --upgrade bandit pip-audit

      - name: Scan source code with Bandit
        run: bandit -r app

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt
