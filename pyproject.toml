[tool.ruff]
target-version = "py311"
line-length = 88
src = ["app", "tests", "webui"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
markers = [
    "e2e: local browser tests for the Chainlit Web UI",
]
